<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今日要闻 - AI & 科技资讯</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-content">
      <h1 class="logo">今日要闻</h1>
      <p class="subtitle">AI & 科技资讯精选</p>
    </div>
  </header>

  <div class="container">
    <aside class="sidebar">
      <nav class="category-nav">
        <button class="category-btn active" data-category="all">
          <span class="category-icon">📰</span>
          <span class="category-name">全部</span>
          <span class="category-count" id="count-all">0</span>
        </button>
        <div class="category-divider"></div>
        <button class="category-btn" data-category="ai">
          <span class="category-icon">🤖</span>
          <span class="category-name">AI要闻</span>
          <span class="category-count" id="count-ai">0</span>
        </button>
        <button class="category-btn" data-category="tech">
          <span class="category-icon">💻</span>
          <span class="category-name">科技要闻</span>
          <span class="category-count" id="count-tech">0</span>
        </button>
      </nav>
    </aside>

    <main class="main-content">
      <!-- Time Header -->
      <div class="time-header">
        <div class="time-info">
          <span class="time-label">更新时间</span>
          <span class="time-value" id="lastUpdated">加载中...</span>
        </div>
        <div class="page-info">
          <span id="pageInfo">1 / 1</span>
        </div>
      </div>

      <!-- News List -->
      <div class="news-list" id="newsList">
        <!-- News items will be rendered here -->
      </div>

      <!-- Empty State -->
      <div class="empty-state" id="emptyState" style="display: none;">
        <div class="empty-icon">📭</div>
        <p>暂无新闻记录</p>
        <p class="empty-hint">请让Claude帮你更新新闻</p>
      </div>

      <!-- Pagination -->
      <div class="pagination" id="pagination">
        <button class="page-btn" id="prevPage" disabled>
          <span class="page-icon">‹</span> 上一页
        </button>
        <div class="page-numbers" id="pageNumbers"></div>
        <button class="page-btn" id="nextPage" disabled>
          下一页 <span class="page-icon">›</span>
        </button>
      </div>
    </main>
  </div>

  <footer class="footer">
    <p>今日要闻 · AI & 科技资讯精选</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
